name: Deploy to VPS (PM2)

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  APP_NAME: dailyhelp-api
  NODE_VERSION: 22
  RELEASE_ARCHIVE: dailyhelp-api-release.tar.gz

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: package-lock.json

      - run: npm ci

      - run: npm run build

      - name: Package release artifact
        run: |
          tar --owner=0 --group=0 --mode='go-w' -czf "${RELEASE_ARCHIVE}" \
            dist package.json package-lock.json ecosystem.config.js notification_templates

      - name: Set up SSH
        env:
          SSH_KEY: ${{ secrets.DEV_SSH_KEY }}
          SSH_HOST: ${{ secrets.DEV_SSH_HOST }}
          SSH_PORT_RAW: ${{ secrets.DEV_SSH_PORT }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          PORT="${SSH_PORT_RAW:-22}"
          echo "SSH_PORT=$PORT" >> $GITHUB_ENV
          echo "SSH_HOST=$SSH_HOST" >> $GITHUB_ENV
          ssh-keyscan -t ed25519 -p "$PORT" "$SSH_HOST" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Deploy via wrapper
        env:
          SSH_USER: ${{ secrets.DEV_SSH_USER }}
        run: |
          RELEASE="release-$(date +%s)-${{ github.run_number }}-${{ github.sha }}"
          ssh -i ~/.ssh/deploy_key -p "$SSH_PORT" "$SSH_USER@$SSH_HOST" \
            "deploy $APP_NAME $RELEASE" < "${RELEASE_ARCHIVE}"

      - name: Tear down SSH
        if: always()
        run: rm -f ~/.ssh/deploy_key
